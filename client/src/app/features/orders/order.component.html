<div class="mx-auto mt-32 ">
    <h2 class="font-semibold text-2xl mb-6 text-center">My Orders</h2>
    <div class="flex flex-col">
        <div class="w-full">
            <table class="min-w-full divide-y divide-gray-200 cursor-pointer">
                <thead class="bg-amber-700">
                    <tr class="uppercase text-gray-600 text-sm">
                        <th class="text-center px-6 py-3 text-white">Order</th>
                        <th class="text-left text-white">Date</th>
                        <th class="text-left text-white">Total</th>
                        <th class="text-left text-white">Status</th>
                    </tr>
                </thead>
                <tbody class=" divide-y divide-gray-200">
                    @for (order of orders; track $index) {
                        <tr routerLink="/orders/{{order.id}}" class="hover:bg-amber-700">
                            <th class="px-6 py-3"># {{order.id}}</th>
                            <td>{{order.orderDate | date:'medium'}}</td>
                            <td>{{order.total | currency}}</td>
                            <td>{{order.orderStatus}}</td>
                        </tr>
                    }
                </tbody>
            </table>
        </div>
    </div>
</div>
